name: X - Kill Switch AWS

on:
  workflow_dispatch:

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del codigo
        uses: actions/checkout@v4

      - name: 2. Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: 3. Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: 4. Configurar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: 5. Restaurar estado de Terraform
        uses: actions/cache@v4
        with:
          path: |
            *.tfstate*
          key: terraform-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            terraform-state-${{ github.ref_name }}-

      - name: 6. Terraform Init
        run: terraform init

      - name: 7. Limpieza total de Kubernetes
        continue-on-error: true
        run: |
          CLUSTER_NAME="$(terraform output -raw cluster_name 2>/dev/null || echo '')"
          if [ -z "$CLUSTER_NAME" ]; then
            CLUSTER_NAME="$(aws eks list-clusters --query 'clusters[?contains(@,`innovatech`)]' --output text)"
          fi
          if [ -n "$CLUSTER_NAME" ]; then
            aws eks update-kubeconfig --region us-east-1 --name "$CLUSTER_NAME"
            kubectl delete namespace innovatech --ignore-not-found=true --wait=false
            kubectl delete deployment --all --all-namespaces --ignore-not-found=true 2>/dev/null || true
            kubectl delete svc --all --all-namespaces --ignore-not-found=true 2>/dev/null || true
          fi

      - name: 8. Vaciar ECR (eliminar imagenes)
        continue-on-error: true
        run: |
          for repo in $(aws ecr describe-repositories --query 'repositories[].repositoryName' --output text 2>/dev/null); do
            echo "Limpiando: $repo"
            DIGESTS=$(aws ecr list-images --repository-name "$repo" --query 'imageIds[].imageDigest' --output text 2>/dev/null || true)
            if [ -n "$DIGESTS" ]; then
              for digest in $DIGESTS; do
                aws ecr batch-delete-image --repository-name "$repo" --image-ids "imageDigest=$digest" 2>/dev/null || true
              done
            fi
          done

      - name: 9. Terraform Destroy
        timeout-minutes: 45
        run: terraform destroy -auto-approve
